name: Release PURL Patrol
run-name: release-purl-patrol
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # test:

  semantic-release:
    # needs: [test]
    runs-on: ubuntu-latest
    name: semantic-release
    permissions:
      contents: write
    outputs:
      RELEASE_TAG: ${{ steps.release.outputs.RELEASE_TAG }}
      RELEASE_VERSION: ${{ steps.release.outputs.RELEASE_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm install
      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # automatically created by GH action
        run: npx semantic-release   # npx is included in npm -> Ubuntu


  delivery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    name: Push to container registry
    needs: [semantic-release]
    steps:
      - name: Checkout Github Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ needs.semantic-release.outputs.RELEASE_TAG }}
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/maibornwolff/purl-patrol:latest
            ghcr.io/maibornwolff/purl-patrol:${{ needs.semantic-release.outputs.RELEASE_VERSION }}

      - name: Create SBOM with Docker Scout
        env:
          RELEASE_VERSION: ${{ needs.semantic-release.outputs.RELEASE_VERSION }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh -o install-scout.sh
          sh install-scout.sh
          docker scout sbom ghcr.io/maibornwolff/purl-patrol:$RELEASE_VERSION --format cyclonedx -o sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom.cdx.json

  call-github-action:
    needs: delivery
    permissions:
      contents: read
    uses: ./.github/workflows/public_testing_github_actions.yaml

  calling-publish-azure-extension-workflow:
    needs: delivery
    permissions:
      contents: read
    uses: ./.github/workflows/publish-azure-extension.yml
    with:
      release_version: ${{needs.semantic-release.outputs.RELEASE_VERISON}}
